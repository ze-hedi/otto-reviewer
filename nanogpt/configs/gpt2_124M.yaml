# Full GPT-2 124M reproduction on FineWeb-Edu 10BT.
# 19073 steps * 524288 tokens = ~10B tokens.

model:
  n_layer: 12
  n_head: 12
  n_embd: 768
  block_size: 1024
  vocab_size: 50304        # rounded up from 50257 for tensor-core alignment
  dropout: 0.0
  bias: false

optim:
  optimizer: adamw
  lr: 6.0e-4
  min_lr: 6.0e-5
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip: 1.0
  warmup_steps: 715
  max_steps: 19073

batch:
  batch_tokens: 524288     # ~0.5M tokens / optim step
  micro_batch_size: 64     # per-GPU
  seq_len: 1024

runtime:
  dtype: bfloat16
  compile: true
  ddp: true
  tf32: true

eval:
  eval_interval: 250
  eval_iters: 20
  hellaswag_interval: 1000

checkpoint:
  interval: 1000

data:
  kind: fineweb_edu
