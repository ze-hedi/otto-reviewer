# Debug config: 100 steps, tiny batch. For sanity-checking the training loop
# end-to-end before launching the full run.

model:
  n_layer: 12
  n_head: 12
  n_embd: 768
  block_size: 1024
  vocab_size: 50304
  dropout: 0.0
  bias: false

optim:
  optimizer: adamw
  lr: 6.0e-4
  min_lr: 6.0e-5
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip: 1.0
  warmup_steps: 10
  max_steps: 100

batch:
  batch_tokens: 16384
  micro_batch_size: 4
  seq_len: 1024

runtime:
  dtype: bfloat16
  compile: false
  ddp: false
  tf32: true

eval:
  eval_interval: 25
  eval_iters: 5
  hellaswag_interval: 0    # 0 disables

checkpoint:
  interval: 50
